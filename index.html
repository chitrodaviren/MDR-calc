<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Calculator</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; margin-top: 25px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .result-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; border: 1px solid #b3d7ff; }
        #total { font-size: 24px; font-weight: bold; color: #007bff; }
        .history { width: 100%; max-width: 400px; margin-top: 20px; }
        .history-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #007bff; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Product Calc</h2>
        <label>Product Name</label>
        <input type="text" id="prodName" placeholder="e.g. Rack A">
        <label>Quantity</label>
        <input type="number" id="qty" value="1">
        <label>Price per Unit</label>
        <input type="number" id="price" value="100">
        <button onclick="calculate()">Calculate & Save</button>
        <div class="result-box">
            <strong>Total Amount:</strong>
            <div id="total">$0.00</div>
        </div>
    </div>
    <div class="history">
        <h3>Recent History</h3>
        <div id="historyList"></div>
    </div>
    <script>
        let history = JSON.parse(localStorage.getItem('myHistory')) || [];
        renderHistory();
        function calculate() {
            const name = document.getElementById('prodName').value || "Unnamed Product";
            const q = parseFloat(document.getElementById('qty').value);
            const p = parseFloat(document.getElementById('price').value);
            const total = q * p;
            const totalStr = `$${total.toFixed(2)}`;
            document.getElementById('total').innerText = totalStr;
            const entry = { detail: `${name}: ${q} x $${p}`, total: totalStr, time: new Date().toLocaleTimeString() };
            history.unshift(entry);
            localStorage.setItem('myHistory', JSON.stringify(history));
            renderHistory();
        }
        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = history.slice(0, 5).map(item => `
                <div class="history-item">
                    <strong>${item.total}</strong> - ${item.detail}<br>
                    <small style="color:#999">${item.time}</small>
                </div>
            `).join('');
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
